name: Build Android APK

on:
  push:
    branches:
      - main
      - inventory-v1

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        working-directory: client/android
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: npm install
        working-directory: client
        run: npm install

      - name: Verify cloud build config
        run: |
          if [ -z "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "::error::GitHub Secret VITE_API_BASE_URL 未配置，APK 将默认 localhost 无法在真机使用"
            exit 1
          fi
          if [ -n "${{ secrets.VITE_PROXY_TOKEN }}" ]; then
            echo "VITE_PROXY_TOKEN 已配置，请确保 Worker 也已设置相同的 PROXY_AUTH_TOKEN"
          else
            echo "::notice::未配置 VITE_PROXY_TOKEN（可选）；若 Worker 启用了 PROXY_AUTH_TOKEN，APK 对话将返回 401"
          fi

      - name: npm run build
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_PROXY_TOKEN: ${{ secrets.VITE_PROXY_TOKEN }}
        run: npm run build

      - name: npx cap sync android
        working-directory: client
        run: npx cap sync android

      - name: Use official Gradle for CI
        working-directory: client/android
        run: |
          sed -i 's|mirrors.cloud.tencent.com/gradle|services.gradle.org/distributions|g' gradle/wrapper/gradle-wrapper.properties

      - name: Gradle assembleDebug
        working-directory: client/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload app-debug.apk
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
