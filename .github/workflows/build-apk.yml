name: Build Android APK

on:
  push:
    branches:
      - main
      - inventory-v1

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        working-directory: client/android
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: npm install
        working-directory: client
        run: npm install

      - name: Verify cloud build config
        run: |
          if [ -z "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "::error::GitHub Secret VITE_API_BASE_URL 未配置，APK 将默认 localhost 无法在真机使用"
            exit 1
          fi
          if [ -n "${{ secrets.VITE_PROXY_TOKEN }}" ]; then
            echo "VITE_PROXY_TOKEN 已配置，请确保 Worker 也已设置相同的 PROXY_AUTH_TOKEN"
          else
            echo "::notice::未配置 VITE_PROXY_TOKEN（可选）；若 Worker 启用了 PROXY_AUTH_TOKEN，APK 对话将返回 401"
          fi

      - name: npm run build
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_PROXY_TOKEN: ${{ secrets.VITE_PROXY_TOKEN }}
        run: npm run build

      - name: npx cap sync android
        working-directory: client
        run: npx cap sync android

      - name: Use official Gradle for CI
        working-directory: client/android
        run: |
          sed -i 's|mirrors.cloud.tencent.com/gradle|services.gradle.org/distributions|g' gradle/wrapper/gradle-wrapper.properties

      - name: Restore permanent signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KUCUNBAO_KEYSTORE_BASE64 || secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.KUCUNBAO_STORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KUCUNBAO_KEY_ALIAS || secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KUCUNBAO_KEY_PASSWORD || secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::固定签名 Secrets 未完整配置，拒绝生成随机签名 APK"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/KuCunBao-release.jks"
          fingerprint=$(keytool -list -v \
            -keystore "$RUNNER_TEMP/KuCunBao-release.jks" \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" | sed -n 's/.*SHA256: //p' | tr -d ':[:space:]')
          if [ "$fingerprint" != "F4473D2FBFFBF24496E126DA6F6EE344616D09271224CF5E5E9DA59E03D0122E" ]; then
            echo "::error::签名证书不是库存宝原始固定签名，拒绝构建"
            exit 1
          fi
          echo "固定签名证书校验通过"

      - name: Gradle assembleRelease with permanent signature
        working-directory: client/android
        env:
          KUCUNBAO_KEYSTORE_FILE: ${{ runner.temp }}/KuCunBao-release.jks
          KUCUNBAO_STORE_PASSWORD: ${{ secrets.KUCUNBAO_STORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
          KUCUNBAO_KEY_ALIAS: ${{ secrets.KUCUNBAO_KEY_ALIAS || secrets.KEY_ALIAS }}
          KUCUNBAO_KEY_PASSWORD: ${{ secrets.KUCUNBAO_KEY_PASSWORD || secrets.KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Prepare fixed-signature APK
        run: cp client/android/app/build/outputs/apk/release/app-release.apk KuCunBao-AI-release.apk

      - name: Upload fixed-signature release APK
        uses: actions/upload-artifact@v4
        with:
          name: KuCunBao-AI-fixed-signature
          path: KuCunBao-AI-release.apk
          if-no-files-found: error
